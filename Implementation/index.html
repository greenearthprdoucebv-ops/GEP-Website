<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth Produce</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #faf7f4;
        color: #4b3632;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: #6b4239;
        font-size: 1.05rem;
      }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.35rem 0.75rem;
        background: #5b6b3f;
        color: #fff;
        font-size: 0.8rem;
        font-weight: 500;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello</h1>
      <p>Green Earth Produce — site coming soon.</p>
      <span class="badge">Deployed on Vercel</span>
